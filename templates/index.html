<!DOCTYPE html>
<html>

    <head>
        <title>{{.Title}}</title>
        <link rel="stylesheet" href="/static/style.css">
    </head>

    <body>
        <h1>{{.Title}}</h1>

        {{if .IsLoggedIn}}
            <p>Welcome back, {{.Username}}</p>
            <button>Create New Post</button>
            <a href="/logout">Logout</a> | <a href="/about">About Us</a>
        {{else}}
            <p>Welcome, guest!</p>
            <a href="/login">Login</a> | <a href="/register">Register</a> | <a href="/about">About Us</a>
        {{end}}

        <h2>Recent Posts</h2>
        <ul>
            {{range .Posts}}
                <li>
                    <strong>{{.Title}}</strong> - by {{.Author}}
                    <p>{{.Content}}</p>
                </li>
            {{end}}
        </ul>
    </body>

</html>
